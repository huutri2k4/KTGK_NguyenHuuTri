<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 400px;">
    <div class="card shadow">
        <div class="card-header bg-primary text-white text-center"><h3>Đăng nhập</h3></div>
        <div class="card-body">
            <div th:if="${param.error}" class="alert alert-danger">Sai tên hoặc mật khẩu!</div>

            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label>Tên đăng nhập</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Mật khẩu</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                <div class="mt-3 text-center">
                    <hr>
                    <p>Hoặc đăng nhập nhanh bằng:</p>
                    <a th:href="@{/oauth2/authorization/google}" class="btn btn-danger w-100">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20px" class="me-2">
                        Sign in with Google
                    </a>
                </div>
            </form>
            <p class="mt-3 text-center">Chưa có tài khoản? <a href="/register">Đăng ký</a></p>
        </div>
    </div>
</div>
</body>
</html>
