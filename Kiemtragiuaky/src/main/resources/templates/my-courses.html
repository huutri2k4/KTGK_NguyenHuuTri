<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Courses</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/home">Course Registration</a>
    <a href="/home" class="btn btn-outline-light btn-sm">Quay lại trang chủ</a>
  </div>
</nav>

<div class="container">
  <h2 class="mb-4">Học phần tôi đã đăng ký</h2>
  <div class="row" th:if="${not #lists.isEmpty(myCourses)}">
    <div class="col-md-4 mb-3" th:each="c : ${myCourses}">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h5 class="card-title fw-bold" th:text="${c.name}"></h5>
          <p class="card-text">Tín chỉ: <span th:text="${c.credits}"></span></p>
          <p class="card-text text-muted">Giảng viên: <span th:text="${c.lecturer}"></span></p>
          <span class="badge bg-success">Đã đăng ký thành công</span>
        </div>
      </div>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(myCourses)}" class="alert alert-warning text-center">
    Bạn chưa đăng ký học phần nào. <a href="/home">Đăng ký ngay!</a>
  </div>
</div>
</body>
</html>
