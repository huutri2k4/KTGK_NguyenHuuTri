<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Admin - Manage Courses</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2>Quản lý học phần</h2>
<a href="/admin/courses/add" class="btn btn-primary mb-3">Thêm học phần mới</a>
<table class="table table-striped">
  <thead>
  <tr>
    <th>ID</th> <th>Tên</th> <th>Tín chỉ</th> <th>Giảng viên</th> <th>Hành động</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="course : ${courses}">
    <td th:text="${course.id}"></td>
    <td th:text="${course.name}"></td>
    <td th:text="${course.credits}"></td>
    <td th:text="${course.lecturer}"></td>
    <td>
      <a th:href="@{/admin/courses/edit/{id}(id=${course.id})}" class="btn btn-warning btn-sm">Sửa</a>
      <a th:href="@{/admin/courses/delete/{id}(id=${course.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
