<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Sửa học phần</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="card shadow" style="max-width: 600px; margin: auto;">
  <div class="card-header bg-warning"><h3>Cập nhật học phần</h3></div>
  <div class="card-body">
    <form th:action="@{/admin/courses/save}" th:object="${course}" method="post">
      <input type="hidden" th:field="*{id}">

      <div class="mb-3">
        <label class="form-label">Tên học phần</label>
        <input type="text" th:field="*{name}" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Số tín chỉ</label>
        <input type="number" th:field="*{credits}" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Giảng viên</label>
        <input type="text" th:field="*{lecturer}" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Link hình ảnh</label>
        <input type="text" th:field="*{image}" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Danh mục</label>
        <select th:field="*{category.id}" class="form-control">
          <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-100">Cập nhật</button>
      <a href="/admin/courses" class="btn btn-secondary w-100 mt-2">Quay lại</a>
    </form>
  </div>
</div>
</body>
</html>
