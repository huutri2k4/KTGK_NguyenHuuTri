<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 450px;">
    <div class="card shadow">
        <div class="card-header bg-success text-white text-center">
            <h3>Đăng ký tài khoản</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/register}" th:object="${student}" method="post">
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập (Username)</label>
                    <input type="text" th:field="*{username}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" th:field="*{password}" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Đăng ký ngay</button>
            </form>
            <div class="mt-3 text-center">
                <p>Đã có tài khoản? <a href="/login">Đăng nhập tại đây</a></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
